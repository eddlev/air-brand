<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AIR by VM4AI — Email Signature</title>
</head>
<!--
  HOW TO USE
  1. Host email-signature-logo.png somewhere public (e.g. https://vm4ai.com/email-signature-logo.png)
     and replace LOGO_URL below with that link. (Most mail clients won't show local or data-URI images.)
  2. Replace the [bracketed] fields with your details.
  3. Copy the table block below (from <table> to </table>) into your mail client's
     signature editor — use its "insert HTML / edit source" option, or paste the rendered
     signature directly. Gmail: paste the rendered version; Outlook/Apple Mail: paste source.
  Fonts: mail clients won't load Space Grotesk, so this falls back to Helvetica/Arial — the
  brand still reads through the color, layout, and mark.
-->
<body style="margin:0;padding:24px;background:#ffffff;">

<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse:collapse;font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;">
  <tr>
    <td style="vertical-align:top;padding-right:16px;">
      <img src="LOGO_URL" alt="AIR" width="46" height="46" style="display:block;border:0;width:46px;height:46px;">
    </td>
    <td style="vertical-align:top;border-left:2px solid #C9A227;padding-left:16px;">
      <div style="font-size:16px;font-weight:bold;color:#1A1613;line-height:1.2;">[ Your Name ]</div>
      <div style="font-size:12px;color:#6E665C;padding-top:2px;">[ Title ] · AIR by VM4AI</div>
      <div style="font-size:12px;color:#1A1613;padding-top:8px;line-height:1.6;">
        <a href="mailto:[email]" style="color:#1A1613;text-decoration:none;">[ email ]</a>
        &nbsp;·&nbsp; [ phone ]<br>
        <a href="https://vm4ai.com" style="color:#C9A227;text-decoration:none;font-weight:bold;">vm4ai.com</a>
      </div>
      <div style="font-size:11px;color:#C9A227;letter-spacing:.04em;padding-top:8px;font-family:'JetBrains Mono','Courier New',monospace;">Configure. Organize. Execute.</div>
    </td>
  </tr>
</table>

</body>
</html>
