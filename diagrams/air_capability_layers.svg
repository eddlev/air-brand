<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="720" height="330"><style>@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono&display=swap");.d-frame{fill:none;stroke:#C9A227}.d-surface{fill:#2A231D;stroke:#4C453E}.d-txt{fill:#ECE4D8;font-family:'Space Grotesk',system-ui,sans-serif;font-weight:500}.d-txt.sm{fill:#9A8F80;font-family:'JetBrains Mono',monospace;font-weight:400}.d-txt.cap{fill:#C9A227;font-family:'JetBrains Mono',monospace;text-transform:uppercase}</style><rect width="720" height="330" fill="#1A1613"/><rect class="d-frame" x="60" y="18" width="600" height="56" rx="10" stroke-width="2"/><text class="d-txt" x="360.0" y="37.0" text-anchor="middle" dominant-baseline="central" font-size="15">Default Starter Profile</text><text class="d-txt sm" x="360.0" y="56.0" text-anchor="middle" dominant-baseline="central" font-size="11">normal starting point · governs by default</text><rect class="d-surface" x="60" y="140" width="180" height="64" rx="10" stroke-width="1.5"/><text class="d-txt" x="150.0" y="163.0" text-anchor="middle" dominant-baseline="central" font-size="13">Specialist profile</text><text class="d-txt sm" x="150.0" y="182.0" text-anchor="middle" dominant-baseline="central" font-size="10.5">stricter judgment</text><rect class="d-surface" x="270" y="140" width="180" height="64" rx="10" stroke-width="1.5"/><text class="d-txt" x="360.0" y="163.0" text-anchor="middle" dominant-baseline="central" font-size="13">Domain package</text><text class="d-txt sm" x="360.0" y="182.0" text-anchor="middle" dominant-baseline="central" font-size="10.5">terminology + evidence</text><rect class="d-surface" x="480" y="140" width="180" height="64" rx="10" stroke-width="1.5"/><text class="d-txt" x="570.0" y="163.0" text-anchor="middle" dominant-baseline="central" font-size="13">Method layer</text><text class="d-txt sm" x="570.0" y="182.0" text-anchor="middle" dominant-baseline="central" font-size="10.5"